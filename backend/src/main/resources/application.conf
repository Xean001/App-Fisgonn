ktor {
  deployment {
    port = 8080
    port = ${?PORT}
  }
  application {
    modules = [ com.example.fisgon.backend.ApplicationKt.module ]
  }
}

db {
  jdbcUrl = ${?DATABASE_URL}
  host = ${?DB_HOST}
  port = ${?DB_PORT}
  name = ${?DB_NAME}
  user = ${?DB_USER}
  password = ${?DB_PASSWORD}
  driver = "org.postgresql.Driver"
  maxPoolSize = 10
}

jwt {
  secret = ${?JWT_SECRET}
  issuer = "fisgon"
  audience = "fisgon-users"
  ttlSeconds = 2592000
}
