services:
  postgres:
    image: postgres:16
    container_name: fisgon-postgres
    environment:
      POSTGRES_DB: fisgon
      POSTGRES_USER: fisgon
      POSTGRES_PASSWORD: fisgon
    ports:
      - "5432:5432"
    volumes:
      - fisgon-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fisgon -d fisgon"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  fisgon-postgres-data:
